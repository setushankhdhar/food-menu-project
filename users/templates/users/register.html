{% extends "myapp/base.html" %}
{% block body %}

<h1 class="text-2xl font-bold text-center mt-6">
    Registration Page
</h1>

<form method="post">
    {% csrf_token %}

    <div class="mx-auto max-w-md rounded border m-5 p-7 bg-sky-200 space-y-4">

        {{form}}
        

        <button
            type="submit"
            class="block w-24 mx-auto rounded p-2 mt-4 bg-green-500 text-white hover:bg-green-600 transition"
        >
            Register
        </button>

    </div>
</form>

{% endblock %}
